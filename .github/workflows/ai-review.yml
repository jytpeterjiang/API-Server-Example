name: AI Code Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      model:
        description: 'AI 模型名称'
        required: false
        default: 'deepseek-v4-flash'

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # 获取 PR 的变更内容
      - name: Get PR diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git diff origin/${BASE_REF}...HEAD > pr_diff.txt

      # 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # 安装 CodeBuddy CLI（锁定版本 v2.116.0）
      - name: Install CodeBuddy CLI
        run: npm install -g @tencent-ai/codebuddy-code@v2.116.0

      # 执行 AI 代码审查
      - name: AI Code Review
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_INTERNET_ENVIRONMENT: internal
          MODEL_NAME: ${{ github.event.inputs.model || 'deepseek-v4-flash' }}
        run: |
          if [ -z "$CODEBUDDY_API_KEY" ]; then
            echo "Error: CODEBUDDY_API_KEY is not set"
            exit 1
          fi

          cat pr_diff.txt | codebuddy -p \
            --model "${MODEL_NAME}" \
            -y \
            "请审查以下代码变更，识别潜在的安全漏洞、性能问题和代码质量问题。" \
            > review_result.txt || {
              echo "CodeBuddy execution failed"
              exit 1
            }

      # 发布 PR 评论
      - name: Post review comment
        uses: actions/github-script@v8
        with:
          script: |
            if (!context.payload.pull_request) {
              console.log('非 PR 触发，跳过评论发布');
              return;
            }

            const fs = require('fs');
            const MAX_COMMENT_LENGTH = 60000; // GitHub API 限制 65536，预留余量

            let reviewText = fs.readFileSync('review_result.txt', 'utf8');

            if (!reviewText || reviewText.trim() === '') {
              console.log('审查结果为空，跳过评论发布');
              return;
            }

            const header = '## AI 代码审查结果\n\n';
            const maxBodyLength = MAX_COMMENT_LENGTH - header.length;

            if (reviewText.length > maxBodyLength) {
              reviewText = reviewText.substring(0, maxBodyLength - 50) + '\n\n...（审查结果过长，已截断）';
            }

            const comment = header + reviewText;

            try {
              await github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment
              });
              console.log('评论发布成功');
            } catch (error) {
              core.setFailed(`发布评论失败: ${error.message}`);
            }
