name: AI Code Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # 2. 获取 PR 的变更内容
      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      # 3. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # 4. 安装 CodeBuddy CLI（锁定版本）
      - name: Install CodeBuddy CLI
        run: npm install -g @tencent-ai/codebuddy-code@latest

      # 5. 执行 AI 代码审查
      - name: AI Code Review
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_INTERNET_ENVIRONMENT: internal
        run: |
          # 调试：确认 Key 已注入
          echo "Key length: ${#CODEBUDDY_API_KEY}"

          if [ -z "$CODEBUDDY_API_KEY" ]; then
            echo "Error: CODEBUDDY_API_KEY is not set"
            exit 1
          fi

          # 执行审查，直接输出文本
          cat pr_diff.txt | codebuddy -p \
            --model deepseek-v4-flash \
            -y \
            "请审查以下代码变更，识别潜在的安全漏洞、性能问题和代码质量问题。" \
            > review_result.txt || {
              echo "CodeBuddy execution failed"
              exit 1
            }

      # 6. 发布 PR 评论
      - name: Post review comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const reviewText = fs.readFileSync('review_result.txt', 'utf8');

            const comment = '## [AI] AI 代码审查结果\n\n' + reviewText;

            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
