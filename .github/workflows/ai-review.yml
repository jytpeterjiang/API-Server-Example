name: AI Code Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  ai-review:
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: read

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # 2. 获取 PR 的变更内容
      - name: Get PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > pr_diff.txt

      # 3. 设置 Node.js 环境
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      # 4. 安装 CodeBuddy CLI（锁定版本）
      - name: Install CodeBuddy CLI
        run: npm install -g @tencent-ai/codebuddy-code@latest

      # 5. 执行 AI 代码审查
      - name: AI Code Review
        env:
          CODEBUDDY_API_KEY: ${{ secrets.CODEBUDDY_API_KEY }}
          CODEBUDDY_INTERNET_ENVIRONMENT: internal
        run: |
          # 调试：确认 Key 已注入
          echo "Key length: ${#CODEBUDDY_API_KEY}"

          if [ -z "$CODEBUDDY_API_KEY" ]; then
            echo "Error: CODEBUDDY_API_KEY is not set"
            exit 1
          fi

          # 执行审查，使用 json-schema 保证结构化输出
          cat pr_diff.txt | codebuddy -p \
            --model deepseek-v4-flash \
            -y \
            --output-format json \
            --json-schema '{"type":"object","properties":{"issues":{"type":"array","items":{"type":"object","properties":{"severity":{"type":"string"},"file":{"type":"string"},"line":{"type":"number"},"description":{"type":"string"},"suggestion":{"type":"string"}},"required":["severity","file","line","description","suggestion"]}}},"required":["issues"]}' \
            "请审查以下代码变更，识别潜在的安全漏洞、性能问题和代码质量问题。" \
            > raw_result.json || {
              echo "CodeBuddy execution failed"
              exit 1
            }

          # 提取 structured_output 字段（使用 --json-schema 时结构化输出在此字段）
          if [ -s raw_result.json ]; then
            cat raw_result.json | python3 -c "import json,sys; data=json.load(sys.stdin); print(json.dumps(data.get('structured_output', data.get('result','{}')), ensure_ascii=False))" > review_result.json
          else
            echo '{"issues":[]}' > review_result.json
          fi

      # 6. 发布 PR 评论
      - name: Post review comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const result = JSON.parse(fs.readFileSync('review_result.json', 'utf8') || '{}');

            let comment = '## [AI] AI 代码审查结果\n\n';

            if (result.issues && result.issues.length > 0) {
              const high = result.issues.filter(i => i.severity === 'high' || i.severity === '高');
              const medium = result.issues.filter(i => i.severity === 'medium' || i.severity === '中');

              comment += `发现 **${result.issues.length}** 个问题：\n`;
              comment += `- [高] 高严重度: ${high.length} 个\n`;
              comment += `- [中] 中严重度: ${medium.length} 个\n\n`;

              result.issues.forEach((issue, index) => {
                const label = issue.severity === 'high' || issue.severity === '高' ? '[高]' : '[中]';
                comment += `### ${label} 问题 ${index + 1}\n`;
                comment += `- **文件**: \`${issue.file || '未知'}\`\n`;
                comment += `- **位置**: 第 ${issue.line || '?'} 行\n`;
                comment += `- **描述**: ${issue.description || ''}\n`;
                comment += `- **建议**: ${issue.suggestion || ''}\n\n`;
              });
            } else {
              comment += '[通过] 代码审查通过，未发现问题。';
            }

            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
